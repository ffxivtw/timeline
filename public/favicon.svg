<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 底：Action Blue 圓角方塊（對應 design token primary #0066cc） -->
  <rect width="64" height="64" rx="14" fill="#0066cc" />
  <!-- 時間軸：一條主線與三個版本節點，節點大小遞增代表版本推進 -->
  <line x1="12" y1="32" x2="52" y2="32" stroke="#ffffff" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round" />
  <circle cx="17" cy="32" r="5" fill="#ffffff" fill-opacity="0.75" />
  <circle cx="32" cy="32" r="6.5" fill="#ffffff" fill-opacity="0.9" />
  <circle cx="47" cy="32" r="8" fill="#ffffff" />
  <!-- 最新節點的內芯，呼應「目前版本」高亮 -->
  <circle cx="47" cy="32" r="3.5" fill="#0066cc" />
</svg>
